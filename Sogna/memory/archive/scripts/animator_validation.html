<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animator Validation - Sogna</title>
    <style>
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 12px;
            opacity: 0;
            transform: translateY(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        h1 {
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <h1>Sogna Animator Validation</h1>
    <div class="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
    </div>

    <script type="module">
        import { flow } from '../Curator/engines/Animator/scripts/sogna_flow.js';

        console.log("Animator Validation Started");

        // Animate boxes with presets
        setTimeout(() => {
            flow.animate("#box1", flow.presets.fadeUp, { duration: 0.8, delay: 0.2 });
            flow.animate("#box2", flow.presets.fadeUp, { duration: 0.8, delay: 0.4 });
            flow.animate("#box3", flow.presets.fadeUp, { duration: 0.8, delay: 0.6 });
            
            console.log("Animations triggered");
        }, 500);
    </script>
</body>
</html>
