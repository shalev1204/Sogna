# Sogna Sovereign Scan Policy - Tranquil Mode
# For use with Predatore Engine

description: "Safe, non-destructive security reconnaissance of the Sogna ecosystem."

rules:
  avoid:
    - description: "Destructive file modifications"
      type: "method"
      url_path: ".*"
    - description: "Database truncation or data deletion"
      type: "path"
      url_path: "/api/admin/clean.*"
  focus:
    - description: "MCP Tool definitions and security"
      type: "path"
      url_path: "toolkit/shared/mcp/.*"
    - description: "Environment variable handling"
      type: "path"
      url_path: ".env.*"
    - description: "Sognatore CLI entry points"
      type: "path"
      url_path: "apps/worker/src/index.ts"

pipeline:
  max_concurrent_pipelines: 2
  retry_preset: "default"
