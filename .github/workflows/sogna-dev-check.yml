name: Sogna Dev Check

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'Sogna/**'
      - '.github/workflows/sogna-dev-check.yml'
  pull_request:
    branches:
      - main
      - test
    paths:
      - 'Sogna/**'
      - '.github/workflows/sogna-dev-check.yml'

concurrency:
  group: sogna-dev-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: pnpm check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: Sogna

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: Sogna/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck monorepo
        run: pnpm run check

      - name: Summary
        if: success()
        run: echo "pnpm check OK en ${{ matrix.os }}."
