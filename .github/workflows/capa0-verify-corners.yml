name: Capa 0 — Verify Corners

on:
  pull_request:
    branches:
      - main
      - test
      - master
  push:
    branches:
      - main
      - test
      - master
    paths:
      - 'Sogna/Curator/corners/**'
      - 'Sogna/scripts/deploy-corners.*'
      - 'Sogna/scripts/verify-corners.*'
      - 'Sogna/scripts/corners-lib.mjs'
      - 'Sogna/platform.manifest.json'
      - '.gitignore'
      - '.gitattributes'
      - '.rgignore'
      - '.cursorignore'
      - '.claudeignore'
      - '.cursor/**'
      - '.claude/**'
      - '.agents/**'
      - 'CLAUDE.md'
      - '.github/workflows/capa0-verify-corners.yml'

concurrency:
  group: capa0-verify-corners-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-corners:
    name: verify-corners (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Capa 2 corners + ignores
        run: node Sogna/scripts/verify-corners.mjs

      - name: Summary
        if: success()
        run: echo "Capa 0 OK — esquinas e ignores alineados con SSOT (${{ matrix.os }})."
